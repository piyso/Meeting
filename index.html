<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://api.piyapi.cloud https://api.deepgram.com; font-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlueArkive</title>
    <style>
      body {
        margin: 0;
        background: #030303;
        overflow: hidden;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #030303;
        z-index: 9999;
      }
      #splash .logo {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: radial-gradient(circle, #22d3ee 0%, #3b82f6 60%, transparent 70%);
        box-shadow:
          0 0 40px rgba(34, 211, 238, 0.4),
          0 0 80px rgba(59, 130, 246, 0.2);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes ping {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        75%,
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
