name: Build & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip upload to dl.bluearkive.com'
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Build macOS (arm64 + x64)
  # ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove large model files (prevent 3.5GB ASAR)
        run: |
          mkdir -p /tmp/models-backup
          for f in resources/models/*.gguf resources/models/ggml-*.bin; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/models-backup/
              echo "Moved: $(basename "$f")"
            fi
          done
          echo "✅ Large model files moved out"

      - name: Free disk space (prevent hdiutil failures)
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h /
          # Remove iOS/watchOS/tvOS simulators (~12GB)
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/iOS*.simruntime || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/watchOS*.simruntime || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/tvOS*.simruntime || true
          # Remove Android SDK (~5GB)
          sudo rm -rf /usr/local/lib/android || true
          # Remove .NET (~3GB)
          sudo rm -rf /usr/local/share/dotnet || true
          # Remove Haskell/GHC (~2GB)
          sudo rm -rf /opt/ghc || true
          # Remove large Homebrew caches
          rm -rf ~/Library/Caches/Homebrew || true
          echo "=== Disk space AFTER cleanup ==="
          df -h /

      - name: Build Mac (arm64 + x64)
        run: |
          # If no certificate is configured, explicitly disable code signing
          # Setting CSC_LINK="" causes electron-builder to interpret CWD as cert → crash
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "⚠️ No code signing certificate — building unsigned"
          fi
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          USE_HARD_LINKS: false

      - name: Verify DMG sizes (must be < 500MB)
        run: |
          for f in release/*.dmg; do
            size=$(stat -f %z "$f")
            sizeMB=$((size / 1024 / 1024))
            echo "$f: ${sizeMB}MB"
            if [ $sizeMB -gt 500 ]; then
              echo "❌ FATAL: $f is ${sizeMB}MB (> 500MB limit). Model files leaked into ASAR!"
              exit 1
            fi
          done
          echo "✅ All DMGs within size limit"

      - name: Generate latest-mac.yml
        run: |
          # electron-builder generates this automatically, but verify it exists
          if [ ! -f release/latest-mac.yml ]; then
            echo "❌ latest-mac.yml not generated!"
            exit 1
          fi
          cat release/latest-mac.yml

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Build Windows (x64)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove large model files
        shell: bash
        run: |
          mkdir -p /tmp/models-backup
          for f in resources/models/*.gguf resources/models/ggml-*.bin; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/models-backup/
              echo "Moved: $(basename "$f")"
            fi
          done

      - name: Build Windows
        shell: bash
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "⚠️ No code signing certificate — building unsigned"
          fi
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Build Linux (x64)
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove large model files
        run: |
          mkdir -p /tmp/models-backup
          for f in resources/models/*.gguf resources/models/ggml-*.bin; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/models-backup/
              echo "Moved: $(basename "$f")"
            fi
          done

      - name: Build Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.blockmap
            release/latest-linux.yml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Resilient Atomic Deployment (Hetzner/Coolify)
  # Ships whatever succeeded — partial failures
  # don't block other platforms from getting updates
  # ─────────────────────────────────────────────
  deploy:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      !inputs.skip_deploy &&
      (needs.build-mac.result == 'success' ||
       needs.build-windows.result == 'success' ||
       needs.build-linux.result == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: package.json

      - name: Download successful artifacts (flattened)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "  Build Results"
          echo "═══════════════════════════════════════"
          echo "  macOS:   ${{ needs.build-mac.result }}"
          echo "  Windows: ${{ needs.build-windows.result }}"
          echo "  Linux:   ${{ needs.build-linux.result }}"
          echo ""
          echo "📦 Artifacts to deploy:"
          find artifacts -type f -exec ls -lh {} \; | sort
          echo ""
          echo "Critical file check:"
          [ -f artifacts/latest-mac.yml ] && echo "  ✅ latest-mac.yml" || echo "  ⚠️ latest-mac.yml MISSING (macOS build failed)"
          [ -f artifacts/latest.yml ] && echo "  ✅ latest.yml" || echo "  ⚠️ latest.yml MISSING (Windows build failed)"
          [ -f artifacts/latest-linux.yml ] && echo "  ✅ latest-linux.yml" || echo "  ⚠️ latest-linux.yml MISSING (Linux build failed)"
          BLOCKMAPS=$(find artifacts -name '*.blockmap' 2>/dev/null | wc -l)
          echo "  📊 Blockmaps: ${BLOCKMAPS} (needed for fast delta updates)"

      - name: Validate Deployment Secrets
        env:
          COOLIFY_HOST: ${{ secrets.COOLIFY_HOST }}
          COOLIFY_USER: ${{ secrets.COOLIFY_USER }}
          COOLIFY_KEY: ${{ secrets.COOLIFY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.COOLIFY_DEPLOY_PATH }}
        run: |
          missing=""
          [ -z "$COOLIFY_HOST" ] && missing="$missing COOLIFY_HOST"
          [ -z "$COOLIFY_USER" ] && missing="$missing COOLIFY_USER"
          [ -z "$COOLIFY_KEY" ] && missing="$missing COOLIFY_SSH_KEY"
          [ -z "$DEPLOY_PATH" ] && missing="$missing COOLIFY_DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "❌ Missing deployment secrets:$missing"
            echo "Configure these in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ All deployment secrets present"

      - name: Atomic Deploy to Hetzner (dl.bluearkive.com)
        env:
          COOLIFY_HOST: ${{ secrets.COOLIFY_HOST }}
          COOLIFY_USER: ${{ secrets.COOLIFY_USER }}
          COOLIFY_KEY: ${{ secrets.COOLIFY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.COOLIFY_DEPLOY_PATH }}
        run: |
          # 1. Setup SSH
          mkdir -p ~/.ssh
          echo "$COOLIFY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$COOLIFY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # 2. Create staging directory (prevents corrupted downloads during rsync)
          STAGING="${DEPLOY_PATH}_staging"
          ssh -i ~/.ssh/deploy_key "$COOLIFY_USER@$COOLIFY_HOST" "mkdir -p $STAGING"

          # 3. Rsync flattened artifacts to staging
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/ \
            "$COOLIFY_USER@$COOLIFY_HOST:$STAGING/"

          # 4. Atomic swap: merge old files (so old version links don't 404 immediately), then instant swap
          ssh -i ~/.ssh/deploy_key "$COOLIFY_USER@$COOLIFY_HOST" "
            if [ -d $DEPLOY_PATH ]; then
              # Preserve old files not in the new release (e.g., install.sh, old versions)
              cp -n $DEPLOY_PATH/* $STAGING/ 2>/dev/null || true
              mv $DEPLOY_PATH ${DEPLOY_PATH}_old_\$(date +%s)
            fi
            mv $STAGING $DEPLOY_PATH
            # Cleanup old backups (keep only the most recent)
            ls -dt ${DEPLOY_PATH}_old_* 2>/dev/null | tail -n +2 | xargs rm -rf 2>/dev/null || true
          "
          echo "🚀 Atomic deployment complete — zero downtime"

      - name: Verify Deployed Versions
        run: |
          EXPECTED=$(node -p "require('./package.json').version")
          echo "Expected version: $EXPECTED"
          sleep 5  # Allow nginx to pick up new files

          errors=0
          for file in latest-mac.yml latest.yml latest-linux.yml; do
            if [ -f "artifacts/$file" ]; then
              VER=$(curl -sf "https://dl.bluearkive.com/$file" | grep '^version:' | awk '{print $2}')
              if [ "$VER" = "$EXPECTED" ]; then
                echo "✅ $file → v$VER"
              else
                echo "❌ $file → v$VER (expected $EXPECTED)"
                errors=$((errors + 1))
              fi
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "⚠️ $errors platform(s) showing wrong version."
            echo "  This may be due to CDN caching — purge cache if using Cloudflare."
            echo "  Or check nginx config on Hetzner."
          else
            echo ""
            echo "✅ All deployed platforms are live with v$EXPECTED"
          fi

  # ─────────────────────────────────────────────
  # GitHub Release (also resilient)
  # ─────────────────────────────────────────────
  github-release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.build-mac.result == 'success' ||
       needs.build-windows.result == 'success' ||
       needs.build-linux.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Download successful artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f -exec ls -lh {} \; | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: BlueArkive ${{ github.ref_name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
