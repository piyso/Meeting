name: Build & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip upload to dl.bluearkive.com'
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Build macOS (arm64 + x64)
  # ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove large model files (prevent 3.5GB ASAR)
        run: |
          mkdir -p /tmp/models-backup
          for f in resources/models/*.gguf resources/models/ggml-*.bin; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/models-backup/
              echo "Moved: $(basename "$f")"
            fi
          done
          echo "✅ Large model files moved out"

      - name: Free disk space (prevent hdiutil failures)
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h /
          # Remove iOS/watchOS/tvOS simulators (~12GB)
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/iOS*.simruntime || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/watchOS*.simruntime || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/tvOS*.simruntime || true
          # Remove Android SDK (~5GB)
          sudo rm -rf /usr/local/lib/android || true
          # Remove .NET (~3GB)
          sudo rm -rf /usr/local/share/dotnet || true
          # Remove Haskell/GHC (~2GB)
          sudo rm -rf /opt/ghc || true
          # Remove large Homebrew caches
          rm -rf ~/Library/Caches/Homebrew || true
          echo "=== Disk space AFTER cleanup ==="
          df -h /

      - name: Build Mac (arm64 + x64)
        run: |
          # If no certificate is configured, explicitly disable code signing
          # Setting CSC_LINK="" causes electron-builder to interpret CWD as cert → crash
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "⚠️ No code signing certificate — building unsigned"
          fi
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          USE_HARD_LINKS: false

      - name: Verify DMG sizes (must be < 500MB)
        run: |
          for f in release/*.dmg; do
            size=$(stat -f %z "$f")
            sizeMB=$((size / 1024 / 1024))
            echo "$f: ${sizeMB}MB"
            if [ $sizeMB -gt 500 ]; then
              echo "❌ FATAL: $f is ${sizeMB}MB (> 500MB limit). Model files leaked into ASAR!"
              exit 1
            fi
          done
          echo "✅ All DMGs within size limit"

      - name: Generate latest-mac.yml
        run: |
          # electron-builder generates this automatically, but verify it exists
          if [ ! -f release/latest-mac.yml ]; then
            echo "❌ latest-mac.yml not generated!"
            exit 1
          fi
          cat release/latest-mac.yml

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Build Windows (x64)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove large model files
        shell: bash
        run: |
          mkdir -p /tmp/models-backup
          for f in resources/models/*.gguf resources/models/ggml-*.bin; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/models-backup/
              echo "Moved: $(basename "$f")"
            fi
          done

      - name: Build Windows
        shell: bash
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "⚠️ No code signing certificate — building unsigned"
          fi
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Build Linux (x64)
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove large model files
        run: |
          mkdir -p /tmp/models-backup
          for f in resources/models/*.gguf resources/models/ggml-*.bin; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/models-backup/
              echo "Moved: $(basename "$f")"
            fi
          done

      - name: Build Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.blockmap
            release/latest-linux.yml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Deploy all artifacts to dl.bluearkive.com
  # ─────────────────────────────────────────────
  deploy:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_deploy }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Deploy to Coolify (dl.bluearkive.com)
        env:
          COOLIFY_HOST: ${{ secrets.COOLIFY_HOST }}
          COOLIFY_USER: ${{ secrets.COOLIFY_USER }}
          COOLIFY_KEY: ${{ secrets.COOLIFY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.COOLIFY_DEPLOY_PATH }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$COOLIFY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$COOLIFY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload all artifacts
          for dir in artifacts/*/; do
            echo "Uploading from $dir..."
            rsync -avz --progress \
              -e "ssh -i ~/.ssh/deploy_key" \
              "$dir" \
              "$COOLIFY_USER@$COOLIFY_HOST:$DEPLOY_PATH/"
          done

          echo "✅ All artifacts deployed to dl.bluearkive.com"

      - name: Verify deployment
        run: |
          echo "Checking dl.bluearkive.com..."
          curl -sf https://dl.bluearkive.com/latest-mac.yml | head -1
          echo "✅ latest-mac.yml accessible"

  # ─────────────────────────────────────────────
  # Create GitHub Release (draft)
  # ─────────────────────────────────────────────
  github-release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all release files
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: BlueArkive ${{ github.ref_name }}
          files: |
            artifacts/mac-builds/*
            artifacts/win-builds/*
            artifacts/linux-builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
