# Nginx Configuration for dl.bluearkive.com (Coolify)
# Apply this as the custom Nginx config in your Coolify resource settings.
#
# Fixes:
#   1. CORS headers for cross-origin fetch from www.bluearkive.com / piynotes.com
#   2. Rate limiting to block vulnerability scanners
#   3. Security headers
#   4. robots.txt to prevent search engine indexing

limit_req_zone $binary_remote_addr zone=download:10m rate=5r/s;

server {
    listen 80;
    server_name dl.bluearkive.com;

    root /usr/share/nginx/html;
    index index.html;

    # Rate limiting
    limit_req zone=download burst=20 nodelay;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS — Allow the landing page to fetch latest-mac.yml, latest.yml, latest-linux.yml
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Handle OPTIONS preflight requests (fixes 405 error)
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Inline robots.txt — don't index the download server
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Serve static files with proper caching
    location ~* \.(dmg|exe|AppImage|deb|rpm|yml|sh|zip)$ {
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Block common attack paths
    location ~* ^/(webhook|admin|internal|assets/js|static/style|js/) {
        return 444;
    }
}
