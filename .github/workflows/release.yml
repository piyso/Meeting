# Build and Release BlueArkive
# Triggers on version tags (v0.1.0, v1.0.0, etc.)
# Builds for macOS (arm64 + x64), Windows (x64), and Linux (x64)
# Auto-publishes DMG/EXE/AppImage to a draft GitHub Release

name: Build & Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production

jobs:
  # ─── macOS Build ────────────────────────────────────────────
  build-mac:
    runs-on: macos-14 # Apple Silicon runner
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build and package (arm64 + x64)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when you have Apple Developer certificate:
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify build artifacts
        run: |
          echo "=== macOS Build Artifacts ==="
          ls -lah release/*.dmg release/*.zip 2>/dev/null || echo "No DMG/ZIP found"
          echo "=== App sizes ==="
          du -sh release/mac*/BlueArkive.app/ 2>/dev/null || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 5

  # ─── Windows Build (disabled — macOS only for now) ───────────
  # build-win:
  #   runs-on: windows-latest
  #   ... (re-enable when Windows releases are needed)

  # ─── Linux Build (disabled — macOS only for now) ─────────────
  # build-linux:
  #   runs-on: ubuntu-latest
  #   ... (re-enable when Linux releases are needed)

  # ─── Create GitHub Release ──────────────────────────────────
  release:
    needs: [build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all release files
        run: |
          echo "=== All Release Artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: BlueArkive ${{ github.ref_name }}
          files: |
            artifacts/mac-builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Auto-Deploy Downloads to Hetzner ────────────────────────
  # dl.bluearkive.com nginx has a volume mount at /data/bluearkive-downloads
  # SCP directly to the host path — no docker-cp needed.
  deploy-downloads:
    needs: [build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: mac-builds

      - name: List all release files
        run: ls -lh mac-builds/

      - name: Deploy build artifacts to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 89.167.57.32
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: 'mac-builds/*'
          target: '/data/bluearkive-downloads/'
          strip_components: 1

      - name: Deploy install.sh to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 89.167.57.32
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: 'landing-web/install.sh'
          target: '/data/bluearkive-downloads/'
          strip_components: 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.167.57.32
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "=== Download server files ==="
            ls -lh /data/bluearkive-downloads/
            echo "=== Verify latest-mac.yml ==="
            cat /data/bluearkive-downloads/latest-mac.yml | head -2
            echo "=== Verify install.sh version ==="
            grep VERSION /data/bluearkive-downloads/install.sh
            echo "Deploy verified"
