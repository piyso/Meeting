<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP is enforced at runtime via session.webRequest.onHeadersReceived in main.ts.
         Do NOT add a CSP meta tag here — browsers intersect both CSPs (most restrictive wins),
         which would block WebSockets, API calls, and fonts needed by the widget. -->
    <title>BlueArkive - Widget</title>
    <style>
      /* Ensure the Electron window's HTML/Body is completely transparent so only the React widget shows */
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: transparent !important;
        overflow: hidden;
      }

      /* App region drag allows moving the borderless window natively in macOS */
      .widget-draggable {
        -webkit-app-region: drag;
        user-select: none;
      }
      .widget-nodrag {
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/WidgetApp.tsx"></script>
  </body>
</html>
