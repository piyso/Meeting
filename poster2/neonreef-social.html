<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueArkive - Neon Reef (Social)</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            /* 1080x1080 IG Square */
            width: 1080px; height: 1080px;
            background-color: #050505; color: #FFFFFF;
            font-family: 'Instrument Sans', sans-serif;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center;
            padding: 80px;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }

        /* Abstract Lava Blobs Background */
        .blobs-container {
            position: absolute; top: -200px; left: -200px; right: -200px; bottom: -200px;
            filter: blur(80px); opacity: 0.8; z-index: 1; pointer-events: none;
        }
        .blob-1 { position: absolute; top: 10%; right: 10%; width: 600px; height: 600px; background: #00F5FF; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        .blob-2 { position: absolute; bottom: 10%; left: 10%; width: 700px; height: 500px; background: #FF2D87; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        .blob-3 { position: absolute; center: 50%; top: 40%; width: 400px; height: 400px; background: #5500FF; border-radius: 50%; }

        /* Noise Over Everything */
        .noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
            z-index: 50; pointer-events: none; mix-blend-mode: overlay;
        }

        .content { position: relative; z-index: 10; transform: rotate(-4deg); }

        .confrontational-hook {
            font-size: 84px; font-weight: 900; line-height: 0.9;
            text-transform: uppercase; letter-spacing: -0.04em;
            margin-bottom: 40px; text-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .action-call {
            font-size: 110px; font-weight: 900; line-height: 0.9;
            letter-spacing: -0.05em; white-space: nowrap;
            text-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .free-word {
            color: #BFFF00; /* Lime */
            text-shadow: 0 0 80px rgba(191, 255, 0, 0.6);
        }

        .logo-bottom {
            position: absolute; bottom: 80px; left: 80px;
            font-size: 32px; font-weight: 800; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="blobs-container">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
        <div class="blob-3"></div>
    </div>
    <div class="noise"></div>
    
    <div class="content">
        <div class="confrontational-hook">11 hours a week in meetings.<br>And you're still taking notes<br>by hand?</div>
        <div class="action-call">Stop typing.<br>Start closing.<br><span class="free-word">FREE FOREVER.</span></div>
    </div>

    <div class="logo-bottom">BlueArkive</div>
</body>
</html>
