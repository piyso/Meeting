<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://api.piyapi.cloud https://api.deepgram.com; font-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlueArkive</title>
    <style>
      body {
        margin: 0;
        background: #030303;
        overflow: hidden;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #030303;
        z-index: 9999;
      }
      #splash .logo {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.5); /* slate-900/50 */
        border: 1px solid rgba(59, 130, 246, 0.2); /* blue-500/20 */
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
      }
      #splash .logo-outer-ring {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(34, 211, 238, 0.3); /* cyan-400/30 */
        animation: ping 3s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      #splash .logo-inner-ring {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(59, 130, 246, 0.4); /* blue-500/40 */
        border-top-color: rgba(34, 211, 238, 0.6); /* cyan-400/60 */
        border-bottom-color: rgba(34, 211, 238, 0.6);
        animation: spin 4s linear infinite;
      }
      #splash .logo-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #22d3ee; /* cyan-400 */
        box-shadow: 0 0 10px rgba(34, 211, 238, 0.8);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes ping {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        75%,
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">
        <div class="logo-outer-ring"></div>
        <div class="logo-inner-ring"></div>
        <div class="logo-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
